<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/index.css">
    <style></style>
</head>

<body>
    <script src="js/utility.js"></script>

    <div class="tab">
        <button class="tablinks" onclick="set_tab(event, 'Home')" id="home_tab_btn">Home</button>
        <button class="tablinks" onclick="set_tab(event, 'Font Texture')" id="font_texture_tab_btn">Font Texture</button>
        <button class="tablinks" onclick="set_tab(event, 'Bitwise')" id="bitwise_tab_btn">Bitwise</button>
    </div>

    <div id="Home" class="tabcontent">

        <h3>Home</h3>
    </div>

    <div id="Font Texture" class="tabcontent" style="height:100%">
        <link rel="stylesheet" href="css/text_texture.css">
        <!-- <h3>Text Texture</h3> -->

        <div style="display: grid;height:100%">
            <!-- font -->
            <fieldset style="display: grid;justify-content: stretch;grid-area:1/1/2/2">
                <legend>Font</legend>
                <div style="display:grid;justify-content: stretch;grid-gap:5px 5px">

                    <div style="grid-area:1/1/auto/auto">
                        <label for=ft_familly>Family:</label>
                        <input id=ft_familly list=familly_list style="width:auto">
                    </div>
                    <div style="grid-area:1/2/auto/auto">
                        <label for="ft_fontsize">Size:</label>
                        <input id="ft_fontsize" type=number max=180 min=6 step=1 style="max-width:75px" value=12>
                    </div>

                    <div style="grid-area:2/1/auto/auto">
                        <label for="ft_script_name">Script:</label>
                        <input id="ft_script_name" list=script_list style="width:auto" value='Basic Latin'>
                    </div>

                    <div style="grid-area:2/2/auto/auto">
                        <a href=# id=add_scr_btn>🞣 Add</a>
                    </div>

                    <div id=scr_collection
                        style="width:100%;max-width:480px;height:100%;border:1px solid rgb(255,255,255);border-radius:5px;grid-area:3/1/auto/3">
                    </div>
                </div>
                <div style="display:grid;grid-area:3/1/auto/auto">
                    <div style="grid-area:1/1/auto/auto">
                        <span>Type:</span>
                    </div>

                    <div style="grid-area:1/2/auto/auto">
                        <input id=is_number type=checkbox checked>
                        <label for=is_number>Number</label>
                    </div>
                    <div style="grid-area:1/3/auto/auto">
                        <input id=is_lower type=checkbox checked>
                        <label for=is_lower>Lower</label>
                    </div>
                    <div style="grid-area:1/4/auto/auto">
                        <input id=is_upper type=checkbox checked>
                        <label for=is_upper>Upper</label>
                    </div>
                    <div style="grid-area:1/5/auto/auto">
                        <input id=is_symbol type=checkbox checked>
                        <label for=is_symbol>Symbol</label>
                    </div>

                    <div style="grid-area:2/1/auto/auto">
                        <span>Style:</span>
                    </div>
                    <div style="grid-area:2/2/auto/auto">
                        <input id=is_italic type=checkbox>
                        <label for=is_italic>Italic</label>
                    </div>
                    <div style="grid-area:2/3/auto/auto">
                        <input id=is_bold type=checkbox>
                        <label for=is_bold>Bold</label>
                    </div>
                </div>
                <br>
            </fieldset>

            <fieldset style="display: grid;justify-content: stretch;grid-area:2/1/3/2">
                <!-- Decoration -->
                <legend>Decoration:</legend>
                <div style="display:grid;justify-content:start;grid-gap:5px 5px">
                    <div style="grid-area:1/1/2/2">
                        <label>Color:</label>
                    </div>
                    <div style="grid-area:1/2/2/3">
                        <input id=ft_font_color type=color title='Text color' value=#ffffff style="width:75px">
                    </div>
                    <div style="grid-area:1/3/3/4">
                        <input id=ft_font_akpha type=range title='Text transparency' value=1 style="width:100%" max=1
                            min=0 step=0.01>
                    </div>
                    <div style="grid-area:2/1/3/2">
                        <label>Background:</label>
                    </div>
                    <div style="grid-area:2/2/3/3">
                        <input id=ft_background_color type=color title='Background color' value=#ffffff
                            style="width:75px">
                    </div>
                    <div style="grid-area:2/3/3/4">
                        <input id=ft_background_alpha type=range title='Background transparency' value=0
                            style="width:100%" max=1 min=0 step=0.01>
                    </div>
                    <div style="grid-area:3/1/4/2">
                        <input type=checkbox id=ft_is_stoked>
                        <label for=ft_stoke>Stroked</label>
                    </div>
                    <div style="grid-area:3/2/4/3">
                        <input id=ft_stoke_color type=color title='Stroke color' value=#ffffff style="width:75px">
                    </div>
                    <div style="grid-area:3/3/4/4">
                        <input id=ft_stoke_size type=range title='Stroke size' value=1 style="width:100%" max=10 min=0
                            step=1>
                    </div>
                    <div style="grid-area:4/1/5/2">
                        <input type=checkbox id=ft_is_shadowed>
                        <label for=ft_shadow>Shadowed</label>
                    </div>
                    <div style="grid-area:4/2/5/3">
                        <input id=ft_shadow_color type=color title='Shadow color' value=#ffffff style="width:75px">
                    </div>
                    <div style="grid-area:4/3/5/4">
                        <input id=ft_shadow_x type=range title='Offset X' value=0 max=20 min=-20 step=1>
                        <input id=ft_shadow_y type=range title='Offset Y' value=0 max=20 min=-20 step=1>
                    </div>
                    <div style="grid-area:5/1/6/2">
                        <input type=checkbox id=ft_is_glowing>
                        <label for=ft_glowing>Glowing</label>
                    </div>
                    <div style="grid-area:5/2/6/3">
                        <input id=ft_glow_color type=color title='Glow color' value=#ffffff style="width:75px">
                    </div>
                    <div style="grid-area:5/3/6/4">
                        <input id=ft_glow_size type=range title='Glow distance' value=0 style="width:100%" max=20
                            min=0 step=1>
                    </div>
                    <div style="grid-area:6/1/7/2">
                        <input type=checkbox id=ft_is_blured>
                        <label for=ft_blurred>Blurred</label>
                    </div>
                    <div style="grid-area:6/2/7/4">
                        <input id=ft_blur_fuzz type=range title=Blur value=0 class="width:100%" max=20 min=0 step=1>
                    </div>
                    <div style="grid-area:7/1/8/2">
                        <input type=checkbox id=ft_is_reflected>
                        <label for=ft_reflected>Reflected</label>
                    </div>
                    <div style="grid-area:7/2/8/4;width:100%">
                        <input id=ft_reflect_scale type=range title=Scale value=0 style="width:48%" max=1 min=0
                            step=0.01>
                        <input id=ft_reflect_alpha type=range title=Alpha value=0 style="width:48%" max=1 min=0
                            step=0.01>
                    </div>
                </div>
            </fieldset>

            <fieldset style="display: grid;justify-content: stretch;grid-area:3/1/4/2">
                <!-- Chars -->
                <legend>Notecard:</legend>
                <textarea id=ft_char_textarea readonly rows=6 style="width:100%"></textarea>
                <div>
                    <a href=# id=ft_char_copy_btn>📋 Copy to Clipboard</a>
                    <a href=# id=ft_char_reset_btn>⚠️ Reset</a>
                </div>
            </fieldset>

            <fieldset style="display: grid;justify-content: stretch;grid-area:1/2/5/30">

                <legend>Texture:</legend>
                <div style="text-align:center">
                    <div style="white-space:nowrap;display:grid">
                        <div style="grid-column:1">
                            <span>Size:</span> 
                            <select id=ft_texture_size>
                                <option value=16>16
                                <option value=32>32
                                <option value=64>64
                                <option value=128>128
                                <option value=256 selected>256
                                <option value=512>512
                                <option value=1024>1024
                            </select>
                        </div>
                       
                        <a href=# id=ft_update_btn style="grid-column:3">🗘 Update</a>
                        <div style="grid-column:4">
                            <span>🔎 Zoom:</span>
                            <span id=ft_zoom_btn></span>
                        </div>
                        <div style="grid-column:5">
                            <input id=ft_grid_btn type=checkbox>
                            <label for=ft_grid_btn>Show Grid</label>
                        </div>
                        <a href=# id=ft_save_btn style="grid-column:6" download=''>🗀 Save</a>
                    </div>
                    <br>
                    <canvas id=ft_canvas></canvas>
                </div>

            </fieldset>
        </div>
